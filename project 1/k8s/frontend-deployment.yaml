apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: kanban-app
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kanban-app
      component: frontend
  template:
    metadata:
      labels:
        app: kanban-app
        component: frontend
    spec:
      containers:
      - name: frontend
        image: kanban-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: kanban-app
    component: frontend
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    name: http
  selector:
    app: kanban-app
    component: frontend
