apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: kanban-app
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kanban-app
      component: backend
  template:
    metadata:
      labels:
        app: kanban-app
        component: backend
    spec:
      containers:
      - name: backend
        image: kanban-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: api
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: kanban-app
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: api
  selector:
    app: kanban-app
    component: backend
