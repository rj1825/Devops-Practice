apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    app: kanban-app
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kanban-app
      component: redis
  template:
    metadata:
      labels:
        app: kanban-app
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: kanban-app
    component: redis
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: kanban-app
    component: redis
