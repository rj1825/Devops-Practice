version: '3.8'

services:
  redis:
    image: redis:7.0-alpine
    container_name: kanban-redis
    ports:
      - "6379:6379"
    networks:
      - kanban-network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - kanban-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - kanban-network
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

networks:
  kanban-network:
    name: kanban-network
    driver: bridge
