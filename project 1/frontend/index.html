<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Kanban Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-cloud-bolt logo-icon"></i>
                <h2>CloudBoard</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active"><i class="fa-solid fa-table-columns"></i> Kanban Board</a>
                <a href="#" class="nav-item" id="btn-refresh"><i class="fa-solid fa-rotate"></i> Sync Board</a>
                <a href="#" class="nav-item" id="health-indicator">
                    <span class="status-dot warning"></span>
                    <span class="status-text">Connecting...</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <p>Project 1: Microservices</p>
                <span class="badge">v1.0.0</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="header-title">
                    <h1>Task Workspace</h1>
                    <p>Manage your microservice deployment tasks dynamically</p>
                </div>
                <button class="btn btn-primary" id="btn-add-task-modal">
                    <i class="fa-solid fa-plus"></i> New Task
                </button>
            </header>

            <!-- Board Layout -->
            <div class="kanban-board">
                <!-- Column 1: Todo -->
                <div class="kanban-column" id="col-todo" data-status="todo">
                    <div class="column-header">
                        <div class="header-left">
                            <span class="status-dot todo-dot"></span>
                            <h3>To Do</h3>
                        </div>
                        <span class="task-count" id="count-todo">0</span>
                    </div>
                    <div class="column-body tasks-list" id="list-todo">
                        <!-- Tasks go here -->
                    </div>
                </div>

                <!-- Column 2: In Progress -->
                <div class="kanban-column" id="col-in-progress" data-status="in-progress">
                    <div class="column-header">
                        <div class="header-left">
                            <span class="status-dot progress-dot"></span>
                            <h3>In Progress</h3>
                        </div>
                        <span class="task-count" id="count-in-progress">0</span>
                    </div>
                    <div class="column-body tasks-list" id="list-in-progress">
                        <!-- Tasks go here -->
                    </div>
                </div>

                <!-- Column 3: Done -->
                <div class="kanban-column" id="col-done" data-status="done">
                    <div class="column-header">
                        <div class="header-left">
                            <span class="status-dot done-dot"></span>
                            <h3>Done</h3>
                        </div>
                        <span class="task-count" id="count-done">0</span>
                    </div>
                    <div class="column-body tasks-list" id="list-done">
                        <!-- Tasks go here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Adding/Editing Task -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">Create New Task</h3>
                <button class="btn-close" id="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-title">Title</label>
                    <input type="text" id="task-title" required placeholder="Enter task title...">
                </div>
                <div class="form-group">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="3" placeholder="Enter task details..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-status">Status</label>
                        <select id="task-status">
                            <option value="todo">To Do</option>
                            <option value="in-progress">In Progress</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-cancel-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="btn-save-task">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
